repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        args: [--config, backend/pyproject.toml]
        files: ^backend/.*\.py$

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: [--settings-path, backend/pyproject.toml]
        files: ^backend/.*\.py$

  - repo: https://github.com/PyCQA/pylint
    rev: v3.0.3
    hooks:
      - id: pylint
        args: [--rcfile=backend/.pylintrc]
        files: ^backend/.*\.py$
        # Add the project root to the PYTHONPATH so pylint can find the 'backend' module
        entry: bash -c 'PYTHONPATH=. pylint "$@"' --
        additional_dependencies: [
          "websockets==12.0",
          "pyyaml==6.0.1",
          "pydantic==2.8.2",
          "litellm==1.79.1",
          "httpx==0.27.0",
          "google-auth==2.30.0",
          "openai==1.99.5",
          "anthropic==0.72.0",
          "mistralai==0.4.1",
          "pylint-pydantic==0.3.0",
        ]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: ^frontend/src/.*\[jt]sx?$
        args: [--config, frontend/.eslintrc.cjs]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/.*\[jt]sx?$
        args: [--config, frontend/.prettierrc.cjs]
