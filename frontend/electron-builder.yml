appId: com.windieos.desktop
productName: WindieOS

directories:
  output: release

files:
  - dist/**/*
  - src/main/**/*
  - "!src/main/python/**/*"
  - src/shared/**/*
  - src/preload.js
  - package.json

asar: true

publish: null

afterPack: scripts/electron-builder-after-pack.cjs

win:
  icon: src/main/assets/icons/windieos.ico
  target:
    - target: nsis

mac:
  icon: src/main/assets/icons/windieos.icns
  category: public.app-category.productivity
  entitlements: src/main/assets/macos/entitlements.mac.plist
  entitlementsInherit: src/main/assets/macos/entitlements.mac.plist
  extendInfo:
    NSAppleEventsUsageDescription: WindieOS uses Automation access to control System Events for window management and UI automation.
    NSMicrophoneUsageDescription: WindieOS uses microphone access for voice mode and wakeword capture.
  target:
    - target: dmg
    - target: zip

linux:
  # Use a standard Linux icon-set directory (16x16..1024x1024) so deb/rpm ship
  # launcher icons under /usr/share/icons instead of falling back to generic icons.
  icon: src/main/assets/icons/linux
  executableName: windieos
  artifactName: windieos_${version}_${arch}.${ext}
  desktop:
    entry:
      Name: WindieOS
      StartupWMClass: WindieOS
  category: Utility
  maintainer: WindieOS <support@windieos.com>
  target:
    - target: AppImage
    - target: deb
    - target: rpm

deb:
  depends:
    - xdotool

rpm:
  compression: xz
  depends:
    - xdotool
